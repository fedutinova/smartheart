name: Deploy SmartHeart

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false # never cancel an in-flight deploy

env:
  REGISTRY: ghcr.io
  # GHCR image prefix
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run backend tests
        run: go test ./back-api/... -skip TestECGHandler_Integration_

  test-rag:
    name: Test engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: rag_pipeline/requirements*.txt

      - name: Install RAG dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f rag_pipeline/requirements.txt ]; then pip install -r rag_pipeline/requirements.txt; fi
          if [ -f rag_pipeline/requirements-dev.txt ]; then pip install -r rag_pipeline/requirements-dev.txt; fi

      - name: Run RAG tests
        run: pytest rag_pipeline/tests -q

  test-frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  test-admin:
    name: Test admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Typecheck admin
        working-directory: admin
        run: npm run typecheck

      - name: Test admin
        working-directory: admin
        run: npm run test

      - name: Build admin
        working-directory: admin
        run: npm run build

  # ── Build backend image ───────────────────────────────────────────────────────
  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    needs: [test-backend]
    permissions:
      contents: read
      packages: write
    outputs:
      tag: sha-${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_PREFIX }}/backend:latest
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-rag:
    name: Build engine
    runs-on: ubuntu-latest
    needs: [test-rag]
    permissions:
      contents: read
      packages: write
    outputs:
      tag: sha-${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./rag_pipeline
          file: ./rag_pipeline/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/rag:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_PREFIX }}/rag:latest
          cache-from: type=gha,scope=rag
          cache-to: type=gha,mode=max,scope=rag

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: [test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || format('https://api.{0}', secrets.DOMAIN_NAME) }}
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-admin:
    name: Build admin
    runs-on: ubuntu-latest
    needs: [test-admin]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Build
        working-directory: admin
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || format('https://api.{0}', secrets.DOMAIN_NAME) }}
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: admin/dist/
          retention-days: 1

  deploy:
    name: Deploy to server
    needs: [build-backend, build-rag, build-frontend, build-admin]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: admin/dist/

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Write .env file
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAG_ADMIN_API_KEY: ${{ secrets.RAG_ADMIN_API_KEY }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          printf 'DOMAIN_NAME=%s\n'       "$DOMAIN_NAME"       >  /tmp/smartheart.env
          printf 'CORS_ORIGINS=%s\n'      "$CORS_ORIGINS"       >> /tmp/smartheart.env
          printf 'DB_PASSWORD=%s\n'       "$DB_PASSWORD"        >> /tmp/smartheart.env
          printf 'JWT_SECRET=%s\n'        "$JWT_SECRET"         >> /tmp/smartheart.env
          printf 'OPENAI_API_KEY=%s\n'    "$OPENAI_API_KEY"     >> /tmp/smartheart.env
          printf 'RAG_ADMIN_API_KEY=%s\n' "$RAG_ADMIN_API_KEY"  >> /tmp/smartheart.env
          printf 'SMTP_USER=%s\n'         "$SMTP_USER"          >> /tmp/smartheart.env
          printf 'SMTP_PASSWORD=%s\n'     "$SMTP_PASSWORD"      >> /tmp/smartheart.env
          printf 'SMTP_FROM=%s\n'         "$SMTP_FROM"          >> /tmp/smartheart.env
          printf 'SMTP_FROM_NAME=%s\n'    "$SMTP_FROM_NAME"     >> /tmp/smartheart.env
          printf 'FRONTEND_URL=%s\n'      "$FRONTEND_URL"       >> /tmp/smartheart.env
          printf 'GHCR_REPO=%s\n'         "${{ github.repository }}" >> /tmp/smartheart.env
          printf 'BACKEND_TAG=%s\n'       "${{ needs.build-backend.outputs.tag }}" >> /tmp/smartheart.env
          printf 'RAG_TAG=%s\n'           "${{ needs.build-rag.outputs.tag }}"     >> /tmp/smartheart.env

      - name: Upload migrations, compose file, Caddyfile, and .env
        run: |
          SERVER="root@${{ secrets.SERVER_IP }}"

          # Ensure directories exist
          ssh "$SERVER" "mkdir -p /opt/smartheart/infra/caddy /opt/smartheart/migrations"

          # Application config files
          scp /tmp/smartheart.env                          "$SERVER:/opt/smartheart/.env"
          scp docker-compose.prod.yml                      "$SERVER:/opt/smartheart/docker-compose.prod.yml"
          scp infra/caddy/Caddyfile                        "$SERVER:/opt/smartheart/infra/caddy/Caddyfile"

          # Migrations (for new servers / schema changes)
          rsync -avz --delete migrations/ "$SERVER:/opt/smartheart/migrations/"

          # Frontend build — rsync with delete for cache-busted assets
          rsync -avz --delete --exclude='yandex_*.html' frontend/dist/ "$SERVER:/opt/smartheart/frontend/dist/"

          # Admin build
          rsync -avz --delete admin/dist/ "$SERVER:/opt/smartheart/admin/dist/"

      - name: Pull images and restart services
        run: |
          ssh "root@${{ secrets.SERVER_IP }}" bash << 'REMOTE'
            set -euo pipefail
            cd /opt/smartheart

            # Authenticate to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull new images
            docker compose -f docker-compose.prod.yml pull

            # Restart services (zero-downtime: Caddy and DB stay running)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up dangling images to save disk space
            docker image prune -f
          REMOTE

      - name: Health check
        run: |
          echo "Waiting 15s for services to stabilize..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.${{ secrets.DOMAIN_NAME }}/health" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed (HTTP $STATUS)"
          else
            echo "Health check failed (HTTP $STATUS) — check server logs"
            exit 1
          fi
