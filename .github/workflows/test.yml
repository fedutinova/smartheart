name: Test SmartHeart

on:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run backend tests without sandbox-sensitive split
        run: go test ./back-api/... -skip TestECGHandler_Integration_

  rag:
    name: RAG tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: rag_pipeline/requirements*.txt

      - name: Install RAG dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f rag_pipeline/requirements.txt ]; then pip install -r rag_pipeline/requirements.txt; fi
          if [ -f rag_pipeline/requirements-dev.txt ]; then pip install -r rag_pipeline/requirements-dev.txt; fi

      - name: Run RAG tests
        run: pytest rag_pipeline/tests -q

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  admin:
    name: Admin build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Typecheck admin
        working-directory: admin
        run: npm run typecheck

      - name: Test admin
        working-directory: admin
        run: npm run test

      - name: Build admin
        working-directory: admin
        run: npm run build
